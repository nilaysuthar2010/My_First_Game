<body>
    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nilay vs Neymar Football Game</title>

<style>
    body{
        margin:0;
        overflow:hidden;
        background:linear-gradient(#4CAF50,#2E7D32);
        font-family:Arial, sans-serif;
    }

    canvas{
        display:block;
        margin:auto;
        background:#43A047;
        border:5px solid white;
    }

    #info{
        position:absolute;
        top:10px;
        width:100%;
        text-align:center;
        color:white;
        font-size:28px;
        font-weight:bold;
        text-shadow:2px 2px 5px black;
    }

    #controls{
        position:absolute;
        bottom:10px;
        width:100%;
        text-align:center;
        color:white;
        font-size:18px;
        text-shadow:1px 1px 3px black;
    }
</style>
</head>
<body>

<div id="info">
⚽ NILAY vs NEYMAR ⚽
</div>

<div id="controls">
Move Nilay: Arrow Keys | First to 5 Goals Wins!
</div>

<canvas id="gameCanvas" width="1000" height="600"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

let nilayScore = 0;
let neymarScore = 0;

const player = {
    x: 120,
    y: 300,
    radius: 35,
    color: "#2196F3",
    speed: 6,
    name: "Nilay"
};

const neymar = {
    x: 880,
    y: 300,
    radius: 35,
    color: "#FFD600",
    speed: 4,
    name: "Neymar"
};

const ball = {
    x: 500,
    y: 300,
    radius: 18,
    dx: 5,
    dy: 4,
    color: "white"
};

const keys = {};

document.addEventListener("keydown", e => {
    keys[e.key] = true;
});

document.addEventListener("keyup", e => {
    keys[e.key] = false;
});

function drawField() {

    // Grass
    ctx.fillStyle = "#43A047";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // Middle line
    ctx.strokeStyle = "white";
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(canvas.width/2,0);
    ctx.lineTo(canvas.width/2,canvas.height);
    ctx.stroke();

    // Middle circle
    ctx.beginPath();
    ctx.arc(canvas.width/2, canvas.height/2, 80, 0, Math.PI*2);
    ctx.stroke();

    // Goals
    ctx.fillStyle = "white";
    ctx.fillRect(0,220,20,160);
    ctx.fillRect(980,220,20,160);
}

function drawPlayer(p){
    ctx.beginPath();
    ctx.fillStyle = p.color;
    ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = "black";
    ctx.beginPath();
    ctx.arc(p.x-10,p.y-8,4,0,Math.PI*2);
    ctx.arc(p.x+10,p.y-8,4,0,Math.PI*2);
    ctx.fill();

    // Smile
    ctx.beginPath();
    ctx.strokeStyle = "black";
    ctx.arc(p.x,p.y+5,12,0,Math.PI);
    ctx.stroke();

    // Name
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText(p.name,p.x-30,p.y-50);
}

function drawBall(){
    ctx.beginPath();
    ctx.fillStyle = ball.color;
    ctx.arc(ball.x,ball.y,ball.radius,0,Math.PI*2);
    ctx.fill();
}

function movePlayer(){

    if(keys["ArrowUp"] && player.y-player.radius>0)
        player.y -= player.speed;

    if(keys["ArrowDown"] && player.y+player.radius<canvas.height)
        player.y += player.speed;

    if(keys["ArrowLeft"] && player.x-player.radius>0)
        player.x -= player.speed;

    if(keys["ArrowRight"] && player.x+player.radius<canvas.width)
        player.x += player.speed;
}

function moveNeymarAI(){

    // AI follows ball
    if(neymar.y < ball.y)
        neymar.y += neymar.speed;

    if(neymar.y > ball.y)
        neymar.y -= neymar.speed;

    if(neymar.x < ball.x)
        neymar.x += neymar.speed * 0.5;

    if(neymar.x > ball.x)
        neymar.x -= neymar.speed * 0.5;
}

function moveBall(){
    ball.x += ball.dx;
    ball.y += ball.dy;

    // Top and bottom bounce
    if(ball.y-ball.radius < 0 || ball.y+ball.radius > canvas.height){
        ball.dy *= -1;
    }

    // Player collision
    checkCollision(player);
    checkCollision(neymar);

    // Goal detection
    if(ball.x < 0){
        neymarScore++;
        resetBall();
    }

    if(ball.x > canvas.width){
        nilayScore++;
        resetBall();
    }
}

function checkCollision(p){

    const dx = ball.x - p.x;
    const dy = ball.y - p.y;
    const distance = Math.sqrt(dx*dx + dy*dy);

    if(distance < ball.radius + p.radius){

        let angle = Math.atan2(dy,dx);

        ball.dx = Math.cos(angle) * 7;
        ball.dy = Math.sin(angle) * 7;
    }
}

function resetBall(){

    ball.x = canvas.width/2;
    ball.y = canvas.height/2;

    ball.dx = (Math.random() > 0.5 ? 5 : -5);
    ball.dy = (Math.random() > 0.5 ? 4 : -4);

    player.x = 120;
    player.y = 300;

    neymar.x = 880;
    neymar.y = 300;
}

function drawScore(){

    ctx.fillStyle = "white";
    ctx.font = "40px Arial";

    ctx.fillText(nilayScore, 420, 60);
    ctx.fillText(neymarScore, 560, 60);
}

function checkWinner(){

    if(nilayScore >= 5){
        alert("🏆 NILAY WINS THE MATCH!");
        nilayScore = 0;
        neymarScore = 0;
    }

    if(neymarScore >= 5){
        alert("🔥 NEYMAR WINS THE MATCH!");
        nilayScore = 0;
        neymarScore = 0;
    }
}

function gameLoop(){

    drawField();

    movePlayer();
    moveNeymarAI();
    moveBall();

    drawPlayer(player);
    drawPlayer(neymar);
    drawBall();

    drawScore();

    checkWinner();

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
</body>
</html>
